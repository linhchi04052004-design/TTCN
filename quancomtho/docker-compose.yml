services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    container_name: quancomtho-backend
    ports:
      - "8000:8000"
    environment:
      APP_ENV: local
      APP_DEBUG: "true"
      APP_URL: http://localhost:8000
      DB_CONNECTION: mysql
      DB_HOST: host.docker.internal
      DB_PORT: 3306
      DB_DATABASE: quancomtho
      DB_USERNAME: root
      DB_PASSWORD: ""
    extra_hosts:
      - "host.docker.internal:host-gateway"

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    container_name: quancomtho-frontend
    depends_on:
      - backend
    ports:
      - "3000:80"